<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Outside Temp Tile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 28px; /* wie Volume-Widget */
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;

      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    :root {

      --tile-radius: 14px;
      --tile-pad-x: 2px;
      --tile-pad-y: 4px;
      --tile-font: 24px;

      --tile-bg: #3b6cb5;
      --tile-fg: #ffffff;

      --btn-outline: #fff;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      user-select: none;
      color: var(--tile-fg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
      font-feature-settings: "kern" 1, "liga" 1, "calt" 1;
      font-family: "Roboto", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    }

	.tile {
	  display: flex;
	  align-items: center;
	  height: 100%;
	  box-sizing: border-box;

	  /* symmetrischer Außenabstand */
	  padding: 0 10px;

	  border-radius: var(--tile-radius);
	  background: var(--tile-bg);
	  color: var(--tile-fg);
	  white-space: nowrap;
	  font-family: "Roboto", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
	  font-size: var(--tile-font);
	}

	.icon {
	  width: 36px;
	  height: 36px;
	  display: flex;
	  align-items: center;
	  justify-content: center;

	  /* Icon ein Stück nach links ziehen, um den größeren optischen Abstand auszugleichen */
	  margin-left: -12px;   /* bei Bedarf auf -2px / -4px anpassen */
	}

	.temp-block {
	  flex: 1;
	  display: flex;
	  justify-content: flex-end;
	  align-items: center;
	  font-variant-numeric: tabular-nums;
	}

	.val {
	  width: 3ch;
	  text-align: right;
	  font-weight: 700;
	  letter-spacing: -0.3px;
	}

	.unit {
	  margin-left: 0.1em;
	  font-weight: 700;
	  opacity: 0.95;
	}
  </style>
</head>
<body>
  <div class="tile" aria-live="polite" aria-atomic="true">
    <span class="material-symbols-outlined icon">device_thermostat</span>
    <span class="temp-block">
      <span id="temp-val"  class="val">--</span>
      <span id="temp-unit" class="unit">°C</span>
    </span>
  </div>

  <script>
    const WS_URL   = "ws://127.0.0.1:8765";
    const KEY      = "outside_temp";
    const DEBUG    = false;
    const DECIMALS = { C: 0, F: 0 };

    const META = {};
    let lastRawValue = null;

    const elVal  = document.getElementById("temp-val");
    const elUnit = document.getElementById("temp-unit");

    const c2f = c => c * 9/5 + 32;
    const f2c = f => (f - 32) * 5/9;

    function toDisplay(raw){
      const out = META.unit || "°C";
      const inp = META.input_unit || out;
      let v = Number(raw);
      if (!isFinite(v)) return { value: NaN, unit: out, decimals: 0 };

      if (inp === "°C" && out === "°F") v = c2f(v);
      else if (inp === "°F" && out === "°C") v = f2c(v);

      return { value: v, unit: out, decimals: out === "°F" ? DECIMALS.F : DECIMALS.C };
    }

    function render(){
      const { value, unit, decimals } = toDisplay(lastRawValue);

      if (!Number.isFinite(value)) {
        elVal.textContent  = "--";
        elUnit.textContent = unit;
        return;
      }

      elVal.textContent  = value.toFixed(decimals);
      elUnit.textContent = unit;
    }

    (function setupHudiyTheme(){
      window.hudiy = window.hudiy || {};
      const applyTheme = () => {
        const cs = hudiy.colorScheme || {};
        if (cs.primaryContainer)   document.documentElement.style.setProperty("--tile-bg", cs.primaryContainer);
        if (cs.onPrimaryContainer) document.documentElement.style.setProperty("--tile-fg", cs.onPrimaryContainer);
      };
      const prevAttach = hudiy.onAttached;
      hudiy.onAttached = function(){ try{ prevAttach && prevAttach(); }catch{} applyTheme(); };
      hudiy.onColorSchemeChanged = applyTheme;
      applyTheme();
    })();

    function normalizeMeta(metaObj){
      if (metaObj == null) return {};
      if (typeof metaObj === "string") return { unit: metaObj };
      if (typeof metaObj === "object" && !Array.isArray(metaObj)) return metaObj;
      return {};
    }

    let ws, reconn, metaRequested = false;

    function requestMetaNow() {
      if (!ws || ws.readyState !== WebSocket.OPEN || metaRequested) return;
      try {
        ws.send(JSON.stringify({
          type:  "request_meta",
          page:  location.pathname || "",
          href:  location.href || "",
          title: document.title || ""
        }));
        metaRequested = true;
      } catch {}
    }

    function requestMetaIfVisible() {
      if (document.visibilityState === "visible") {
        requestMetaNow();
      }
    }

    function handleMessage(obj){
      if (obj && typeof obj === "object" && "key" in obj){
        if (obj.key !== KEY) return;
        if (obj.meta !== undefined) Object.assign(META, normalizeMeta(obj.meta));
        if (obj.value !== undefined) lastRawValue = Number(obj.value);
        render();
        return;
      }
      if (obj && typeof obj === "object"){
        if (obj._meta && Object.prototype.hasOwnProperty.call(obj._meta, KEY)) {
          Object.assign(META, normalizeMeta(obj._meta[KEY]));
        }
        if (Object.prototype.hasOwnProperty.call(obj, KEY)) {
          lastRawValue = Number(obj[KEY]);
        }
        render();
      }
    }

    function connectWS(){
      try{
        ws = new WebSocket(WS_URL);
        metaRequested = false;

        ws.onopen = () => {
          clearTimeout(reconn);
          requestMetaIfVisible();
        };
        ws.onclose  = () => { reconn = setTimeout(connectWS, 1000); };
        ws.onerror  = () => { try{ ws.close(); }catch{} };
        ws.onmessage= (ev) => {
          try { handleMessage(JSON.parse(ev.data)); }
          catch(e){ if (DEBUG) console.warn("Bad WS payload", e); }
        };
      }catch{
        reconn = setTimeout(connectWS, 1000);
      }
    }

    document.addEventListener("visibilitychange", requestMetaIfVisible);
    connectWS();
    render();
  </script>
</body>
</html>
