<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Volume Tile</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root{
  /* These values scale relative to the Hudiy overlay WebView, not the full screen. */
  --tile-radius: 25.45vh;      /* 14px @ 55px overlay height */
  --tile-pad-x: 7.27vh;        /* 4px @ 55px overlay height */
  --tile-pad-y: 7.27vh;        /* 4px @ 55px overlay height */
  --tile-gap: 3.64vh;          /* 2px @ 55px overlay height */
  --tile-font: 43.64vh;        /* 24px @ 55px overlay height */

  --icon-size: 65.45vh;        /* 36px @ 55px overlay height */
  --icon-svg-size: 50.91vh;    /* 28px @ 55px overlay height */
  --icon-border: 3.64vh;       /* 2px @ 55px overlay height */
  --icon-glow: 14.55vh;        /* 8px @ 55px overlay height */

  --slider-height: 14.55vh;    /* 8px @ 55px overlay height */
  --slider-radius: 5.45vh;     /* 3px @ 55px overlay height */
  --slider-thumb-size: 32.73vh;/* 18px @ 55px overlay height */

  --tile-bg: #3b6cb5;
  --tile-fg: #ffffff;
  --btn-outline: #fff;

  --slider-track: rgba(255,255,255,0.3);
  --mute-track: rgba(255,80,80,0.42);
  --mute-thumb: #ffb3b3;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
}

body {
  display: grid;
  place-items: center;
  user-select: none;
  color: var(--tile-fg);
  font-family: "Roboto", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
}

.tile {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--tile-gap);
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: var(--tile-pad-y) var(--tile-pad-x);
  border-radius: var(--tile-radius);
  background: var(--tile-bg);
  color: var(--tile-fg);
  white-space: nowrap;
  font-size: var(--tile-font);
}

.icon-button {
  width: var(--icon-size);
  height: var(--icon-size);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  flex: 0 0 var(--icon-size);
  border-radius: 50%;
  border: var(--icon-border) solid transparent;
  box-sizing: border-box;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, color 0.15s ease;
}

.icon-button svg {
  width: var(--icon-svg-size);
  height: var(--icon-svg-size);
  display: block;
  fill: currentColor;
  pointer-events: none;
}

.icon-button.animate {
  border-color: var(--btn-outline, #fff);
  box-shadow: 0 0 var(--icon-glow) var(--btn-outline, #fff);
}

#volumeSlider {
  -webkit-appearance: none;
  appearance: none;
  flex: 1 1 auto;
  width: auto;
  min-width: 0;
  max-width: 100%;
  height: var(--slider-height);
  border-radius: var(--slider-radius);
  background: var(--slider-track);
  outline: none;
  transition: background 0.2s ease;
  visibility: hidden;
}

#volumeSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: var(--slider-thumb-size);
  height: var(--slider-thumb-size);
  border-radius: 50%;
  background: var(--tile-fg);
  cursor: pointer;
  transition: background 0.2s ease, box-shadow 0.2s ease;
}

#volumeSlider::-moz-range-thumb {
  width: var(--slider-thumb-size);
  height: var(--slider-thumb-size);
  border: 0;
  border-radius: 50%;
  background: var(--tile-fg);
  cursor: pointer;
  transition: background 0.2s ease, box-shadow 0.2s ease;
}

.tile.muted #volumeSlider {
  background: var(--mute-track);
}

.tile.muted #volumeSlider::-webkit-slider-thumb {
  background: var(--mute-thumb);
  box-shadow: 0 0 var(--icon-glow) rgba(255, 80, 80, 0.85);
}

.tile.muted #volumeSlider::-moz-range-thumb {
  background: var(--mute-thumb);
  box-shadow: 0 0 var(--icon-glow) rgba(255, 80, 80, 0.85);
}

.val {
  font-weight: 700;
  min-width: 10ch;
  text-align: right;
  display: inline-block;
}
</style>
</head>

<body>
<div class="tile" id="volumeTile">
  <span id="vol-down" class="icon-button" role="button" aria-label="Volume down" tabindex="0">
    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
  </span>
  <input id="volumeSlider" type="range" min="0" max="100" step="5" value="50">
  <span id="vol-up" class="icon-button" role="button" aria-label="Volume up" tabindex="0">
    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </span>
  <span id="vol-val" class="val">50%</span>
</div>

<script>
/* ===================== CONFIG ===================== */
const ENABLE_VOLUME_POLLING = false;   // ← toggle this
const POLL_INTERVAL_MS = 750;
/* ================================================== */

const tile = document.getElementById("volumeTile");
const slider = document.getElementById("volumeSlider");
const display = document.getElementById("vol-val");
const btnDown = document.getElementById("vol-down");
const btnUp = document.getElementById("vol-up");

const showPercentage = false;
if (!showPercentage) display.style.display = "none";

function roundToStep(v){ return Math.round(v / 5) * 5; }

function animateBtn(btn) {
  btn.classList.add("animate");
  setTimeout(() => btn.classList.remove("animate"), 150);
}

let isDragging = false;
let lastBackendLevel = null;
let pollTimer = null;

function applyLevelToUI(lvl) {
  lvl = Math.max(0, Math.min(100, roundToStep(Number(lvl))));
  if (!Number.isFinite(lvl)) return;

  slider.value = lvl;
  tile.classList.toggle("muted", lvl === 0);

  if (showPercentage) display.textContent = lvl + "%";
}

async function fetchVolumeAndUpdate({force=false} = {}) {
  try {
    const r = await fetch("/get_volume", { cache: "no-store" });
    const data = await r.json();
    if (data.level === undefined) return;

    const backendLevel = roundToStep(parseInt(data.level, 10));
    if (Number.isNaN(backendLevel)) return;

    if (lastBackendLevel === null) {
      slider.style.visibility = "visible";
      applyLevelToUI(backendLevel);
      lastBackendLevel = backendLevel;
      return;
    }

    if ((force || backendLevel !== lastBackendLevel) && !isDragging) {
      applyLevelToUI(backendLevel);
      lastBackendLevel = backendLevel;
    }
  } catch {}
}

function setVolume(lvl) {
  lvl = Math.max(0, Math.min(100, roundToStep(Number(lvl))));
  if (!Number.isFinite(lvl)) return;

  lastBackendLevel = lvl;
  applyLevelToUI(lvl);

  fetch(`/set_volume?level=${lvl}`, { cache: "no-store" })
    .then(() => {
      if (ENABLE_VOLUME_POLLING) {
        setTimeout(() => fetchVolumeAndUpdate({force:true}), 150);
      }
    })
    .catch(err => console.error("Set volume failed:", err));
}

slider.addEventListener("pointerdown", () => { isDragging = true; });
slider.addEventListener("pointerup", () => { isDragging = false; setVolume(slider.value); });
slider.addEventListener("pointercancel", () => { isDragging = false; });
slider.addEventListener("input", () => applyLevelToUI(slider.value));
slider.addEventListener("change", () => setVolume(slider.value));

function handleButtonKey(ev, action) {
  if (ev.key === "Enter" || ev.key === " ") {
    ev.preventDefault();
    action();
  }
}

const volumeDown = () => { animateBtn(btnDown); setVolume(parseInt(slider.value,10)-10); };
const volumeUp   = () => { animateBtn(btnUp);   setVolume(parseInt(slider.value,10)+10); };

btnDown.addEventListener("click", volumeDown);
btnUp.addEventListener("click", volumeUp);
btnDown.addEventListener("keydown", ev => handleButtonKey(ev, volumeDown));
btnUp.addEventListener("keydown", ev => handleButtonKey(ev, volumeUp));

// Initial read
fetchVolumeAndUpdate({force:true});

// Start polling only if enabled
if (ENABLE_VOLUME_POLLING) {
  pollTimer = setInterval(fetchVolumeAndUpdate, POLL_INTERVAL_MS);
}

// HUDIY Theme
(function setupHudiyTheme(){
  window.hudiy = window.hudiy || {};
  function applyTheme(){
    const cs = hudiy.colorScheme || {};
    if(cs.primaryContainer)   document.documentElement.style.setProperty("--tile-bg", cs.primaryContainer);
    if(cs.onPrimaryContainer) document.documentElement.style.setProperty("--tile-fg", cs.onPrimaryContainer);
    if(cs.outline)            document.documentElement.style.setProperty("--btn-outline", cs.outline);
  }
  const prevAttach = hudiy.onAttached;
  hudiy.onAttached = function(){ try{ prevAttach && prevAttach(); }catch{} applyTheme(); };
  hudiy.onColorSchemeChanged = applyTheme;
  applyTheme();
})();
</script>

</body>
</html>
